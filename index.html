<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Постмортум аналізатор</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeecea;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.2);
  --red-bg:#fcebeb;--red-text:#791f1f;--red-dot:#e24b4a;
  --amber-bg:#faeeda;--amber-text:#633806;--amber-dot:#ef9f27;
  --green-bg:#eaf3de;--green-text:#27500a;--green-dot:#1d9e75;
  --blue-bg:#e6f1fb;--blue-text:#0c447c;
  --gray-bg:#f1efe8;--gray-text:#444441;--gray-dot:#888780;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1e1e1e;--bg2:#252525;--bg3:#2a2a2a;
    --text:#e8e8e8;--text2:#aaa;--text3:#666;
    --border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.2);
    --red-bg:#3a1515;--red-text:#f09595;
    --amber-bg:#2e2010;--amber-text:#fac775;
    --green-bg:#1a2d10;--green-text:#97c459;
    --blue-bg:#0d1e33;--blue-text:#85b7eb;
    --gray-bg:#2a2a28;--gray-text:#b4b2a9;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}
.app{max-width:860px;margin:0 auto;padding:1.5rem 1rem 4rem}
.nav{display:flex;gap:2px;margin-bottom:1.5rem;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:4px}
.nav-tab{flex:1;padding:8px 12px;font-size:13px;font-weight:500;border:none;background:none;color:var(--text2);cursor:pointer;border-radius:var(--radius);transition:all .15s;text-align:center}
.nav-tab:hover{color:var(--text);background:var(--bg2)}
.nav-tab.active{background:var(--bg3);color:var(--text)}
.tab-panel{display:none}.tab-panel.active{display:block}
.api-bar{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 16px;margin-bottom:1rem;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.api-bar label{font-size:12px;color:var(--text2);white-space:nowrap;font-weight:500}
.api-bar input{flex:1;min-width:200px;padding:7px 10px;font-size:13px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-family:monospace}
.api-bar input:focus{outline:2px solid #378add;outline-offset:1px}
.api-status{font-size:11px;white-space:nowrap;color:var(--green-text)}
.upload-zone{border:1.5px dashed var(--border2);border-radius:var(--radius-lg);padding:2.5rem 1.5rem;text-align:center;cursor:pointer;transition:background .15s;background:var(--bg);margin-bottom:1rem}
.upload-zone:hover,.upload-zone.drag{background:var(--bg2);border-color:#378add}
.upload-zone svg{width:36px;height:36px;color:var(--text3);margin:0 auto 12px;display:block}
.upload-zone p{font-size:14px;color:var(--text2);margin-bottom:4px}
.upload-zone small{font-size:12px;color:var(--text3)}
.upload-zone input{display:none}
button{font-family:inherit}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;font-size:13px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);cursor:pointer;transition:background .12s}
.btn:hover{background:var(--bg2)}.btn:active{transform:scale(.98)}
.btn-primary{background:#1a1a1a;color:#fff;border-color:transparent}
.btn-primary:hover{background:#333}.btn-sm{padding:5px 10px;font-size:12px}
@media(prefers-color-scheme:dark){.btn-primary{background:#e8e8e8;color:#1a1a1a}.btn-primary:hover{background:#ccc}}
.progress-wrap{background:var(--bg);border-radius:var(--radius-lg);padding:1.5rem;display:none}
.progress-wrap.show{display:block}
.progress-label{font-size:12px;color:var(--text2);margin-bottom:10px}
.progress-bg{background:var(--bg2);border-radius:3px;height:4px;overflow:hidden}
.progress-fill{height:4px;background:#378add;border-radius:3px;transition:width .3s}
.error-box{background:var(--red-bg);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--red-text);margin-top:10px;display:none}
.error-box.show{display:block}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:12px}
.section-title{font-size:15px;font-weight:600;color:var(--text);margin:1.75rem 0 .75rem}
.exec-summary{background:var(--bg);border:0.5px solid var(--border);border-left:3px solid #378add;border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.5rem}
.exec-summary p{font-size:14px;line-height:1.7;color:var(--text2)}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:1.5rem}
.metric{background:var(--bg2);border-radius:var(--radius);padding:12px 14px}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.metric-val{font-size:22px;font-weight:600;color:var(--text)}
.metric-sub{font-size:11px;color:var(--text3);margin-top:2px}
.metric.highlight{background:var(--red-bg)}.metric.highlight .metric-label,.metric.highlight .metric-val{color:var(--red-text)}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:5px;font-weight:500}
.b-red{background:var(--red-bg);color:var(--red-text)}
.b-amber{background:var(--amber-bg);color:var(--amber-text)}
.b-green{background:var(--green-bg);color:var(--green-text)}
.b-blue{background:var(--blue-bg);color:var(--blue-text)}
.b-gray{background:var(--gray-bg);color:var(--gray-text)}
.issue-row{display:flex;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border);align-items:flex-start}
.issue-row:last-child{border-bottom:none}
.dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.issue-body{font-size:13px;color:var(--text);line-height:1.5}
.issue-meta{font-size:11px;color:var(--text2);margin-top:3px;line-height:1.4}
.rec-card{background:var(--bg2);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px}
.rec-badges{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.rec-text{font-size:13px;color:var(--text);line-height:1.5;margin-bottom:4px;font-weight:500}
.rec-why{font-size:11px;color:var(--text2);line-height:1.4}
.score-bar-row{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:6px}
.score-bar-row span:first-child{width:150px;color:var(--text2);flex-shrink:0}
.score-bar-bg{flex:1;background:var(--bg2);border-radius:3px;height:6px;overflow:hidden}
.score-bar-fill{height:6px;border-radius:3px}
.score-bar-row .val{width:30px;text-align:right;font-weight:500;color:var(--text)}
.actq-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem}
.actq-card{background:var(--bg2);border-radius:var(--radius);padding:12px;text-align:center}
.actq-letter{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.actq-val{font-size:26px;font-weight:700}
.root-primary{background:var(--bg);border:0.5px solid var(--border);border-left:3px solid var(--red-dot);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:8px}
.root-secondary{background:var(--bg2);border-radius:var(--radius);padding:10px 12px;margin-bottom:6px}
.cat-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px}
.cat-row:last-child{border-bottom:none}
.cat-bar-bg{width:100px;background:var(--bg2);border-radius:3px;height:6px;overflow:hidden;flex-shrink:0}
.cat-bar-fill{height:6px;border-radius:3px;background:#378add}
.prompt-wrap{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem}
.prompt-vars{font-size:12px;color:var(--text2);background:var(--bg2);border-radius:var(--radius);padding:8px 12px;margin-bottom:10px;line-height:1.8}
.prompt-vars code{background:var(--bg);padding:1px 5px;border-radius:3px;font-family:monospace;font-size:11px;color:var(--blue-text);border:0.5px solid var(--border)}
textarea.prompt-input{width:100%;min-height:400px;padding:10px 12px;font-size:12px;font-family:monospace;line-height:1.6;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);resize:vertical}
textarea.prompt-input:focus{outline:2px solid #378add;outline-offset:1px}
.prompt-actions{display:flex;gap:8px;margin-top:10px;align-items:center}
.saved-msg{font-size:12px;color:var(--green-text);opacity:0;transition:opacity .3s}
.saved-msg.show{opacity:1}
@media print{
  body{background:#fff}
  .nav,.api-bar,.no-print{display:none!important}
  .tab-panel{display:block!important}
  #tab-prompt{display:none!important}
  .card{break-inside:avoid}
}
</style>
</head>
<body>
<div class="app">

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">
    <div>
      <div style="font-size:18px;font-weight:600">Постмортум аналізатор</div>
      <div style="font-size:13px;color:var(--text2)">3D студія · аналіз проектів</div>
    </div>
  </div>

  <div class="api-bar">
    <label>API key</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
    <span class="api-status" id="apiStatus"></span>
  </div>

  <div class="nav">
    <button class="nav-tab active" onclick="switchTab('analyze')">Аналіз</button>
    <button class="nav-tab" onclick="switchTab('prompt')">Промпт</button>
  </div>

  <div class="tab-panel active" id="tab-analyze">
    <div id="uploadSection">
      <div class="upload-zone" id="dropZone">
        <svg viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="4" y="6" width="28" height="24" rx="2"/>
          <path d="M12 16h12M12 21h8"/>
          <path d="M18 6V1M15 4l3-3 3 3"/>
        </svg>
        <p>Перетягніть CSV або натисніть щоб вибрати</p>
        <small>UTF-8 · роздільник кома або крапка з комою</small>
        <input type="file" id="fileInput" accept=".csv">
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-primary" onclick="startAnalysis()">Аналізувати</button>
        <span style="font-size:12px;color:var(--text3)" id="fileName"></span>
      </div>
      <div class="error-box" id="errorBox"></div>
    </div>
    <div class="progress-wrap" id="progressWrap">
      <div style="font-size:14px;font-weight:500;margin-bottom:4px">Аналізуємо проект...</div>
      <div class="progress-label" id="progressLabel">Читаємо файл...</div>
      <div class="progress-bg"><div class="progress-fill" id="progressFill" style="width:5%"></div></div>
    </div>
    <div id="reportWrap" style="display:none"><div id="report"></div></div>
  </div>

  <div class="tab-panel" id="tab-prompt">
    <div class="prompt-wrap">
      <div style="font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Системний промпт</div>
      <div class="prompt-vars">
        Змінні: <code>{{PROJECT}}</code> <code>{{DURATION}}</code> <code>{{DATES}}</code> <code>{{STATS}}</code> <code>{{TASKS}}</code> <code>{{GAPS}}</code> <code>{{MESSAGES}}</code>
      </div>
      <textarea class="prompt-input" id="promptInput"></textarea>
      <div class="prompt-actions">
        <button class="btn btn-primary btn-sm" onclick="savePrompt()">Зберегти</button>
        <button class="btn btn-sm" onclick="resetPrompt()">Скинути до дефолту</button>
        <span class="saved-msg" id="savedMsg">Збережено</span>
      </div>
    </div>
  </div>

</div>
<script>
const DEFAULT_PROMPT = `Ти операційний аналітик рівня COO у 3D студії візуалізації.

Твоє завдання — згенерувати постмортем звіт, який використовується для управлінських рішень.

Це НЕ переказ переписки.
Це структурований аналіз системних збоїв, бізнес-впливу та необхідних змін у процесах.

---

СТИЛЬ:

* стисло і по суті
* тільки факти, цифри, висновки
* без опису діалогів
* фокус на процесах, а не на людях
* формулюй як "де система дала збій"

---

ДАНІ ПРОЕКТУ:
Проект: {{PROJECT}}, {{DURATION}} днів ({{DATES}})
{{STATS}}
Задачі: {{TASKS}}
Паузи клієнта (>3 днів): {{GAPS}}

УСІ ПОВІДОМЛЕННЯ:
{{MESSAGES}}

---

DEFINITIONS:

* round = цикл "відправка результату → отримання фідбеку"
* standard_round_limit = 3
* extra_rounds = сума по всіх задачах: max(0, task_rounds - 3) для кожної задачі окремо
* our_wait_days = відсутність руху з нашого боку >24 год
* client_wait_days = відсутність відповіді клієнта >24 год
* attribution:
  * internal = під нашим контролем
  * external = клієнт
  * shared = змішаний вплив

---

КЛАСИФІКАЦІЯ ПРОБЛЕМ:

modeling_geometry | materials_textures | lighting | camera_composition | technical_requirements | consistency | client_changes | communication | pipeline_process | unknown

---

WEIGHTED SCORING:

rounds_score (40%): ≤3→95, 4-6→75, 7-10→50, >10→30
time_score (30%): delay<20%→90, 20-50%→70, >50%→40, невідомо→70
process_score (20%): 100 - 15 за кожен process failure (мін 40)
communication_score (10%): high→90, medium→70, low→50

overall_score = rounds*0.4 + time*0.3 + process*0.2 + comm*0.1

ACTQ (0-100): A=accuracy, C=consistency, T=timing, Q=quality
Корекція: A<70→-10, Q<70→-10, C<70→-5

ROOT CAUSE: 1 primary + 2-3 secondary. Primary пояснює більшість проблем.

CAUSALITY: не вигадуй цифри — формулюй як гіпотезу якщо не впевнений.

CONSISTENCY: всі цифри мають співпадати між полями.

---

ПОВЕРНИ ТІЛЬКИ валідний JSON без markdown огорожі:

{
  "overall_score": 0,
  "overall_health": "critical|warning|ok",
  "score_breakdown": {
    "rounds_score": 0,
    "time_score": 0,
    "process_score": 0,
    "communication_score": 0
  },
  "actq": { "A": 0, "C": 0, "T": 0, "Q": 0 },
  "executive_summary": "",
  "kpi": {
    "total_duration_days": 0,
    "delay_percent": 0,
    "total_rounds": 0,
    "extra_rounds": 0,
    "our_wait_days": 0,
    "client_wait_days": 0
  },
  "root_causes": {
    "primary": { "issue": "", "type": "internal|external|shared", "confidence": "high|medium|low" },
    "secondary": [{ "issue": "", "type": "internal|external|shared" }]
  },
  "top_issues": [{ "issue": "", "category": "" }],
  "top_issue_categories": [{ "category": "", "count": 0, "impact": "low|medium|high" }],
  "process_failures": [{
    "process": "", "type": "internal|external|shared", "category": "",
    "failure": "", "root_cause_link": "primary|secondary", "impact": "", "confidence": "high|medium|low"
  }],
  "communication": { "quality": "low|medium|high", "blocking_issues": [], "notes": "" },
  "what_worked": [],
  "action_plan": [{
    "action": "", "owner": "PM|CM|Mentor|Artist|All",
    "priority": "high|medium|low", "timeline": "immediate|next_project|system",
    "expected_metric": ""
  }]
}`;

let csvData = null;

const savedKey = localStorage.getItem('pm_api_key');
if (savedKey) { document.getElementById('apiKey').value=savedKey; document.getElementById('apiStatus').textContent='ключ збережено'; }
document.getElementById('apiKey').addEventListener('input', e=>{
  const v=e.target.value.trim();
  if(v.startsWith('sk-ant-')){ localStorage.setItem('pm_api_key',v); document.getElementById('apiStatus').textContent='збережено'; }
});
document.getElementById('promptInput').value = localStorage.getItem('pm_prompt')||DEFAULT_PROMPT;

function switchTab(tab) {
  document.querySelectorAll('.nav-tab').forEach((t,i)=>t.classList.toggle('active',['analyze','prompt'][i]===tab));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
}
function savePrompt() {
  localStorage.setItem('pm_prompt', document.getElementById('promptInput').value);
  const el=document.getElementById('savedMsg'); el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2000);
}
function resetPrompt() {
  if(!confirm('Скинути промпт до дефолтного?')) return;
  document.getElementById('promptInput').value=DEFAULT_PROMPT;
  localStorage.removeItem('pm_prompt');
}

const dz=document.getElementById('dropZone'), fi=document.getElementById('fileInput');
dz.addEventListener('click',()=>fi.click());
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0])});
fi.addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0])});

function loadFile(f) {
  document.getElementById('fileName').textContent=f.name;
  const reader=new FileReader();
  reader.onload=e=>{csvData=e.target.result; showError('');};
  reader.readAsText(f,'UTF-8');
}

function parseCSV(text) {
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2) return null;
  const sep=lines[0].split(';').length>lines[0].split(',').length?';':',';
  const headers=splitLine(lines[0],sep).map(h=>h.replace(/^"|"$/g,'').trim());
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const vals=splitLine(lines[i],sep);
    if(vals.length<3) continue;
    const obj={};
    headers.forEach((h,idx)=>{obj[h]=(vals[idx]||'').replace(/^"|"$/g,'').trim();});
    rows.push(obj);
  }
  return {rows};
}

function splitLine(line,sep) {
  const r=[]; let cur='',inQ=false;
  for(const c of line){ if(c==='"') inQ=!inQ; else if(c===sep&&!inQ){r.push(cur);cur='';} else cur+=c; }
  r.push(cur); return r;
}

function parseDate(s) {
  if(!s) return new Date(0);
  const d=new Date(s);
  return isNaN(d)?new Date(s.replace(' ','T')):d;
}

function setProgress(pct,label) {
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=label;
}
function showError(msg) {
  const el=document.getElementById('errorBox'); el.textContent=msg; el.classList.toggle('show',!!msg);
}

function isClient(r){return (r.user_role||'').toLowerCase()==='client'}
function isPublic(r){const v=r.visible_for_client;return v==='TRUE'||v===true||v==='true'}
function isInternal(r){const v=r.visible_for_client;return v==='FALSE'||v===false||v==='false'}
function isMentor(r){return (r.user_role||'').toLowerCase()==='mentor'}
function isNoise(body){
  if(!body||body.length<8) return true;
  return /^(\+\+|ok|ок|okay|👍|🙏|дякую|дякуємо|noted|sure|thanks|thank you|зрозуміло|зрозуміла|зрозумів|прийнято|received|got it|sounds good|perfect|great|👌|ясно|добре!?|ок!?|так!?|нє|ні|ага|угу|ладно|супер|чудово|все|хм+|\.\.\.|—|-)\W*$/i.test(body.trim());
}

async function startAnalysis() {
  const apiKey=document.getElementById('apiKey').value.trim();
  if(!apiKey){showError('Введіть Anthropic API ключ');return;}
  if(!csvData){showError('Завантажте CSV файл');return;}
  const parsed=parseCSV(csvData);
  if(!parsed||parsed.rows.length===0){showError('Не вдалось розпарсити CSV');return;}

  showError('');
  document.getElementById('uploadSection').style.display='none';
  const pw=document.getElementById('progressWrap');
  pw.classList.add('show'); pw.style.display='block';
  document.getElementById('reportWrap').style.display='none';

  setProgress(10,'Парсинг даних...');
  console.log('[PM] rows:',parsed.rows.length,'keys:',Object.keys(parsed.rows[0]||{}));

  let stats,prompt;
  try {
    stats=buildStats(parsed.rows);
    setProgress(30,'Підготовка: '+(stats.filteredCount||parsed.rows.length)+' повідомлень...');
    prompt=buildPrompt(stats);
  } catch(e) {
    pw.style.display='none';
    document.getElementById('uploadSection').style.display='block';
    showError('Помилка парсингу: '+e.message); return;
  }

  setProgress(60,'AI аналізує переписку...');
  let analysis;
  try {
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,messages:[{role:'user',content:prompt}]})
    });
    if(!resp.ok){const err=await resp.json();throw new Error(err.error?.message||`HTTP ${resp.status}`);}
    setProgress(85,'Отримали відповідь...');
    const data=await resp.json();
    let raw=data.content[0].text.trim().replace(/```json|```/g,'').trim();
    const s=raw.indexOf('{'),e=raw.lastIndexOf('}');
    if(s!==-1&&e!==-1) raw=raw.slice(s,e+1);
    analysis=JSON.parse(raw);
  } catch(e) {
    pw.style.display='none';
    document.getElementById('uploadSection').style.display='block';
    showError('Помилка API: '+e.message); return;
  }

  setProgress(95,'Будуємо звіт...');
  renderReport(stats,analysis);
  setProgress(100,'Готово!');
  setTimeout(()=>{pw.classList.remove('show');pw.style.display='none';document.getElementById('reportWrap').style.display='block';},300);
}


const DELIVERY_RE = new RegExp(
  '(check.{0,20}result|attached above|please review|please check.{0,30}result|' +
  'looking forward.{0,20}feedback|here you can find|results? attached|' +
  'find.{0,20}result|updated result|check.{0,20}updated|' +
  'sending.{0,20}result|prepared.{0,20}result|' +
  'final result is ready|result is ready|' +
  'check the.{0,20}result|check.{0,10}(new|first|updated|latest).{0,10}result|' +
  'share your (feedback|thoughts)|let us know your thoughts|' +
  'let us know if.{0,20}(good|ok|correct|proceed)|' +
  'review the prepared|prepared.{0,10}(draft|result|image))',
  'i'
);
const FUTURE_RE = new RegExp(
  '\\b(will send|will prepare|will provide|will get back|will check|' +
  'will be ready|will present|aiming to provide|going to send)\\b',
  'i'
);
const APPROVAL_RE = /^(ok\.?|okay|approved|perfect|great|noted|received|got it|will do|sounds good|yes please|confirmed|moving forward|thank you|thanks)[.!,\s]*$/i;

function isDelivery(body) {
  const b = String(body||'');
  return DELIVERY_RE.test(b) && !FUTURE_RE.test(b);
}
function isApproval(body) {
  const b = String(body||'').trim();
  return APPROVAL_RE.test(b) || b.length < 25;
}
function countRounds(msgs) {
  let rounds = 0;
  let state = 'waiting_delivery';
  let lastDeliveryDate = null;
  let i = 0;
  while (i < msgs.length) {
    const m = msgs[i];
    const body = String(m.body||'');
    const date = parseDate(m.created_at).toDateString();
    const client = isClient(m);
    const pub = isPublic(m);
    if (state === 'waiting_delivery') {
      if (!client && pub && isDelivery(body) && lastDeliveryDate !== date) {
        lastDeliveryDate = date;
        state = 'waiting_feedback';
      }
    } else if (state === 'waiting_feedback') {
      if (client) {
        const feedback = [body];
        let j = i + 1;
        while (j < msgs.length && isClient(msgs[j])) {
          feedback.push(String(msgs[j].body||''));
          j++;
        }
        const hasRealFeedback = feedback.some(b => !isApproval(b));
        if (hasRealFeedback) rounds++;
        state = 'waiting_delivery';
        lastDeliveryDate = null;
        i = j - 1;
      }
    }
    i++;
  }
  return rounds;
}

function buildStats(rows) {
  const sorted=[...rows].filter(r=>r.created_at).sort((a,b)=>parseDate(a.created_at)-parseDate(b.created_at));
  if(sorted.length===0) throw new Error('Немає рядків з датою created_at');
  const valid=sorted.filter(r=>!isNaN(parseDate(r.created_at)));
  if(valid.length===0) throw new Error('Жоден рядок не має валідної дати');
  const start=parseDate(valid[0].created_at), end=parseDate(valid[valid.length-1].created_at);
  const durationDays=Math.round((end-start)/86400000);
  const projectName=sorted.find(r=>r.project_name)?.project_name||'Проект';

  const taskMap={};
  sorted.forEach(r=>{const tk=r.task_name||'(корінь проекту)';if(!taskMap[tk])taskMap[tk]=[];taskMap[tk].push(r);});

  const tasks=Object.entries(taskMap).map(([name,msgs])=>{
    const ts=[...msgs].filter(r=>r.created_at).sort((a,b)=>parseDate(a.created_at)-parseDate(b.created_at));
    if(ts.length===0) return null;
    const tS=parseDate(ts[0].created_at),tE=parseDate(ts[ts.length-1].created_at);
    if(isNaN(tS)||isNaN(tE)) return null;
    let ourWait=0,clientWait=0,lastCd=null,lastTd=null;
    ts.forEach(m=>{
      const cl=isClient(m),pub=isPublic(m),d=parseDate(m.created_at);
      if(!cl&&pub){if(lastCd){ourWait+=Math.round((d-lastCd)/86400000);}lastTd=d;lastCd=null;}
      else if(cl){if(lastTd){clientWait+=Math.round((d-lastTd)/86400000);}lastCd=d;lastTd=null;}
    });
    const rounds=countRounds(ts);
    return {name,start:tS.toISOString().slice(0,10),end:tE.toISOString().slice(0,10),
      days:Math.round((tE-tS)/86400000),rounds,ourWait,clientWait};
  }).filter(Boolean);

  const clientMsgs=sorted.filter(isClient);
  const gaps=[];
  for(let i=1;i<clientMsgs.length;i++){
    const g=Math.round((parseDate(clientMsgs[i].created_at)-parseDate(clientMsgs[i-1].created_at))/86400000);
    if(g>3) gaps.push({days:g,from:clientMsgs[i-1].created_at.slice(0,10),to:clientMsgs[i].created_at.slice(0,10)});
  }

  const filtered=sorted.filter(r=>!isNoise(r.body));
  const allMsgs=filtered.map(r=>`[${r.created_at?.slice(0,10)} | ${r.user_name} | ${r.user_role} | ${r.task_name||'root'} | ${isPublic(r)?'PUBLIC':'INTERNAL'}] ${String(r.body||'').slice(0,300)}`);

  return {projectName,durationDays,start:start.toISOString().slice(0,10),end:end.toISOString().slice(0,10),
    totalMsgs:rows.length,filteredCount:filtered.length,clientMsgCount:clientMsgs.length,
    publicTeamMsgs:sorted.filter(r=>!isClient(r)&&isPublic(r)).length,
    internalMsgs:sorted.filter(isInternal).length,mentorMsgs:sorted.filter(isMentor).length,
    tasks,gaps,allMsgs};
}

function buildPrompt(s) {
  const stats=`Повідомлень: ${s.totalMsgs} всього / ${s.clientMsgCount} від клієнта / ${s.publicTeamMsgs} від команди публічно / ${s.internalMsgs} внутрішніх / ${s.mentorMsgs} від ментора`;
  const tasks=s.tasks.map(t=>`"${t.name}": ${t.days} дн, ${t.rounds} раундів (extra: ${Math.max(0,t.rounds-3)}), ми чекали ${t.ourWait} дн, клієнт чекав ${t.clientWait} дн`).join(' | ');
  const gaps=s.gaps.length?s.gaps.map(g=>`${g.days} дн (${g.from}→${g.to})`).join(', '):'немає';
  return (localStorage.getItem('pm_prompt')||DEFAULT_PROMPT)
    .replace('{{PROJECT}}',s.projectName).replace('{{DURATION}}',s.durationDays)
    .replace('{{DATES}}',`${s.start} — ${s.end}`).replace('{{STATS}}',stats)
    .replace('{{TASKS}}',tasks).replace('{{GAPS}}',gaps).replace('{{MESSAGES}}',s.allMsgs.join('\n'));
}

function fmt(n){return Math.round(n||0)}
function sc(v){return v>=80?'var(--green-text)':v>=60?'var(--amber-text)':'var(--red-text)'}
function hBadge(h){return h==='critical'?'b-red':h==='warning'?'b-amber':'b-green'}
function hLabel(h){return h==='critical'?'Критичний':h==='warning'?'Проблемний':'Нормальний'}
function tColor(t){return t==='internal'?'var(--red-dot)':t==='external'?'var(--amber-dot)':'var(--gray-dot)'}
function tBadge(t){return t==='internal'?'b-red':t==='external'?'b-amber':'b-gray'}
function tLabel(t){return t==='internal'?'внутрішня':t==='external'?'клієнт':'спільна'}
function pBadge(p){return p==='high'?'b-red':p==='medium'?'b-amber':'b-gray'}
function tlLabel(t){return t==='immediate'?'зараз':t==='next_project'?'наступний проект':'системно'}
function impBadge(i){return i==='high'?'b-red':i==='medium'?'b-amber':'b-green'}
function confBadge(c){return c==='high'?'b-green':c==='medium'?'b-amber':'b-gray'}

const CAT={modeling_geometry:'Геометрія',materials_textures:'Матеріали/текстури',lighting:'Освітлення',
  camera_composition:'Камера/композиція',technical_requirements:'Технічні вимоги',
  consistency:'Консистентність',client_changes:'Зміни клієнта',communication:'Комунікація',
  pipeline_process:'Пайплайн/процеси',unknown:'Невизначено'};

function renderReport(s,a) {
  const score=fmt(a.overall_score||0);
  const health=a.overall_health||'warning';
  const kpi=a.kpi||{};
  const sb=a.score_breakdown||{};
  const actq=a.actq||{};
  const rc=a.root_causes||{};
  const comm=a.communication||{};

  let html=`
  <div style="margin-bottom:1.5rem">
    <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Постмортум звіт</div>
    <div style="font-size:22px;font-weight:700;margin-bottom:4px">${s.projectName}</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:12px">${s.start} — ${s.end} · ${fmt(s.durationDays)} днів · <span class="badge ${hBadge(health)}">${hLabel(health)}</span></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap" class="no-print">
      <button class="btn" onclick="document.getElementById('uploadSection').style.display='block';document.getElementById('reportWrap').style.display='none'">← Новий аналіз</button>
      <button class="btn" onclick="window.print()">Друк / PDF</button>
    </div>
  </div>

  <div class="exec-summary">
    <div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Executive summary</div>
    <p>${a.executive_summary||''}</p>
  </div>

  <div class="section-title">Overall score</div>
  <div class="card">
    <div style="display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap">
      <div>
        <div style="font-size:56px;font-weight:700;line-height:1;color:${sc(score)}">${score}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:4px">з 100</div>
      </div>
      <div style="flex:1;min-width:180px;padding-top:6px">
        ${[['Rounds ×0.4',sb.rounds_score],['Time ×0.3',sb.time_score],['Process ×0.2',sb.process_score],['Communication ×0.1',sb.communication_score]].map(([l,v])=>`
        <div class="score-bar-row">
          <span>${l}</span>
          <div class="score-bar-bg"><div class="score-bar-fill" style="width:${fmt(v)}%;background:${sc(fmt(v))}"></div></div>
          <span class="val">${fmt(v)}</span>
        </div>`).join('')}
      </div>
    </div>
  </div>

  <div class="section-title">ACTQ</div>
  <div class="actq-grid">
    ${['A','C','T','Q'].map(k=>{const v=fmt(actq[k]||0);const l={A:'Accuracy',C:'Consistency',T:'Timing',Q:'Quality'};return `<div class="actq-card"><div class="actq-letter">${l[k]}</div><div class="actq-val" style="color:${sc(v)}">${v}</div></div>`;}).join('')}
  </div>

  <div class="section-title">KPI</div>
  <div class="metric-grid">
    <div class="metric"><div class="metric-label">Тривалість</div><div class="metric-val">${fmt(kpi.total_duration_days||s.durationDays)}</div><div class="metric-sub">днів</div></div>
    <div class="metric ${fmt(kpi.extra_rounds||0)>0?'highlight':''}"><div class="metric-label">Раунди</div><div class="metric-val">${fmt(kpi.total_rounds||0)}</div><div class="metric-sub">+${fmt(kpi.extra_rounds||0)} понад ліміт</div></div>
    <div class="metric"><div class="metric-label">Ми чекали</div><div class="metric-val">${fmt(kpi.our_wait_days||0)}</div><div class="metric-sub">днів</div></div>
    <div class="metric"><div class="metric-label">Клієнт чекав</div><div class="metric-val">${fmt(kpi.client_wait_days||0)}</div><div class="metric-sub">днів</div></div>
    <div class="metric ${fmt(kpi.delay_percent||0)>50?'highlight':''}"><div class="metric-label">Затримка</div><div class="metric-val">${fmt(kpi.delay_percent||0)}%</div><div class="metric-sub">від плану</div></div>
  </div>

  <div class="section-title">Root causes</div>`;

  if(rc.primary){
    html+=`<div class="root-primary">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap">
        <span style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em">Основна причина</span>
        <span class="badge ${tBadge(rc.primary.type)}">${tLabel(rc.primary.type)}</span>
        <span class="badge ${confBadge(rc.primary.confidence)}">${rc.primary.confidence}</span>
      </div>
      <div style="font-size:14px;font-weight:500">${rc.primary.issue||''}</div>
    </div>`;
  }
  (rc.secondary||[]).forEach(sec=>{
    html+=`<div class="root-secondary">
      <span class="badge ${tBadge(sec.type)}" style="margin-bottom:4px;display:inline-block">${tLabel(sec.type)}</span>
      <div style="font-size:13px;color:var(--text)">${sec.issue||''}</div>
    </div>`;
  });

  if((a.top_issue_categories||[]).length){
    html+=`<div class="section-title">Категорії проблем</div><div class="card">`;
    const mx=Math.max(...(a.top_issue_categories||[]).map(c=>c.count||1));
    (a.top_issue_categories||[]).forEach(c=>{
      html+=`<div class="cat-row">
        <span style="flex:1;font-size:13px">${CAT[c.category]||c.category}</span>
        <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${Math.round((c.count||0)/mx*100)}%"></div></div>
        <span style="font-size:12px;font-weight:500;min-width:18px;text-align:right">${c.count}</span>
        <span class="badge ${impBadge(c.impact)}" style="margin-left:8px">${c.impact}</span>
      </div>`;
    });
    html+=`</div>`;
  }

  if((a.process_failures||[]).length){
    html+=`<div class="section-title">Збої процесів</div><div class="card">`;
    (a.process_failures||[]).forEach(w=>{
      html+=`<div class="issue-row">
        <div class="dot" style="background:${tColor(w.type)}"></div>
        <div style="flex:1">
          <div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px;flex-wrap:wrap">
            <span class="issue-body" style="font-weight:500">${w.process||''}</span>
            <span class="badge ${tBadge(w.type)}">${tLabel(w.type)}</span>
            <span class="badge b-gray">${CAT[w.category]||w.category||''}</span>
            <span class="badge ${confBadge(w.confidence)}">${w.confidence||''}</span>
          </div>
          ${w.failure?`<div class="issue-meta">${w.failure}</div>`:''}
          ${w.impact?`<div class="issue-meta">Вплив: ${w.impact}</div>`:''}
        </div>
      </div>`;
    });
    html+=`</div>`;
  }

  if((a.top_issues||[]).length){
    html+=`<div class="section-title">Топ проблеми</div><div class="card">`;
    (a.top_issues||[]).forEach((iss,i)=>{
      html+=`<div class="issue-row">
        <div style="font-size:12px;font-weight:600;color:var(--text3);min-width:16px;margin-top:2px">${i+1}</div>
        <div><div class="issue-body">${iss.issue||''}</div><div class="issue-meta">${CAT[iss.category]||iss.category||''}</div></div>
      </div>`;
    });
    html+=`</div>`;
  }

  html+=`<div class="section-title">Комунікація</div><div class="card">
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:${comm.notes?'10px':'0'}">
      <span class="badge ${comm.quality==='high'?'b-green':comm.quality==='medium'?'b-amber':'b-red'}">Якість: ${comm.quality==='high'?'висока':comm.quality==='medium'?'середня':'низька'}</span>
    </div>
    ${comm.notes?`<div style="font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:8px">${comm.notes}</div>`:''}
    ${(comm.blocking_issues||[]).map(i=>`<div class="issue-row"><div class="dot" style="background:var(--red-dot)"></div><div class="issue-body">${i}</div></div>`).join('')}
  </div>`;

  if((a.what_worked||[]).length){
    html+=`<div class="section-title">Що спрацювало</div><div class="card">`;
    (a.what_worked||[]).forEach(w=>{html+=`<div class="issue-row"><div class="dot" style="background:var(--green-dot)"></div><div class="issue-body">${w}</div></div>`;});
    html+=`</div>`;
  }

  if((a.action_plan||[]).length){
    html+=`<div class="section-title">Action plan</div>`;
    (a.action_plan||[]).forEach(rec=>{
      html+=`<div class="rec-card">
        <div class="rec-badges">
          <span class="badge ${pBadge(rec.priority)}">${rec.priority==='high'?'Важливо':rec.priority==='medium'?'Середнє':'Низьке'}</span>
          <span class="badge b-gray">${rec.owner||''}</span>
          <span class="badge b-blue">${tlLabel(rec.timeline)}</span>
        </div>
        <div class="rec-text">${rec.action||''}</div>
        ${rec.expected_metric?`<div class="rec-why">Метрика: ${rec.expected_metric}</div>`:''}
      </div>`;
    });
  }

  document.getElementById('report').innerHTML=html;
}
</script>
</body>
</html>
